<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NPA SMART SYSTEM - Generator Istikmal Syariah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #061b18; color: white; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        .bg-istikmal-light { background-color: #102d28; }
        .bg-istikmal-dark { background-color: #0a1f1b; }
        .text-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .border-gold { border-color: #d4af37; }
    </style>
</head>
<body class="bg-[#061b18] min-h-screen pb-20">

    <main class="max-w-xl mx-auto p-5 mt-4">
        <div class="text-center mb-8">
            <h1 class="font-montserrat text-3xl font-extrabold text-[#d4af37] tracking-wide mb-2">ISTIKMAL SYARIAH</h1>
            <p class="text-sm text-gray-300 font-semibold tracking-widest uppercase">Generator V7 - Full Karir</p>
        </div>

        <div class="bg-[#102d28] p-6 rounded-2xl shadow-2xl border border-[#d4af37]/20 space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nama Leader</label>
                <input type="text" id="input-nama" class="w-full bg-[#0a1f1b] border border-gray-600 rounded-xl p-3.5 text-sm text-white focus:ring-2 focus:ring-[#d4af37] outline-none" placeholder="Nama Lengkap">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nomor WhatsApp</label>
                <input type="number" id="input-wa" class="w-full bg-[#0a1f1b] border border-gray-600 rounded-xl p-3.5 text-sm text-white focus:ring-2 focus:ring-[#d4af37] outline-none" placeholder="628xxxxxxxxxx">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Slug Branding</label>
                <input type="text" id="input-slug" class="w-full bg-[#0a1f1b] border border-gray-600 rounded-xl p-3.5 text-sm text-white focus:ring-2 focus:ring-[#d4af37] outline-none" placeholder="NamaBrandAnda">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Jenjang Karir (Posisi)</label>
                <select id="input-jabatan" class="w-full bg-[#0a1f1b] border border-gray-600 rounded-xl p-3.5 text-sm text-white focus:ring-2 focus:ring-[#d4af37] outline-none">
                    <option value="Mitra 3IReborn">Mitra 3IReborn</option>
                    <option value="Team Entrepreneur">Team Entrepreneur</option>
                    <option value="Leader Entrepreneur">Leader Entrepreneur</option>
                    <option value="Bronze Entrepreneur">Bronze Entrepreneur</option>
                    <option value="Silver Entrepreneur" selected>Silver Entrepreneur</option>
                    <option value="Gold Entrepreneur">Gold Entrepreneur</option>
                    <option value="Diamond Executive">Diamond Executive</option>
                    <option value="Royal Executive">Royal Executive</option>
                    <option value="King Executive">King Executive</option>
                    <option value="Queen 3IReborn">Queen 3IReborn</option>
                </select>
            </div>

            <button onclick="generateData()" class="w-full mt-8 bg-[#d4af37] hover:bg-[#b8962f] text-[#061b18] font-extrabold py-4 rounded-xl shadow-lg transition text-sm uppercase tracking-widest">
                🚀 GENERATE SEMUA
            </button>
        </div>

        <div id="result-box" class="hidden mt-8 space-y-5">
            <div id="link-master" class="hidden"></div>
            <div id="link-hot" class="hidden"></div>
            <div id="link-daftar" class="hidden"></div>
            <div class="bg-[#102d28] p-5 rounded-xl border border-gray-700 text-center">
                <p class="text-xs text-gray-400 font-bold uppercase mb-3">QR Code LP Master</p>
                <div class="bg-white p-2 rounded-lg inline-block">
                    <img id="output-qr" src="" class="w-32 h-32">
                </div>
            </div>
        </div>
    </main>

    <script>
        function generateData() {
            const slug = document.getElementById('input-slug').value.trim().toLowerCase().replace(/\s+/g, '-');
            if(!slug) { alert("Isi Slug!"); return; }
            const base = "https://3ireborn.github.io/3ireborn-generator-v4/";
            document.getElementById('link-master').innerText = base + "index.html?ref=" + slug;
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(base + "index.html?ref=" + slug)}`;
            document.getElementById('output-qr').src = qrApiUrl;
            document.getElementById('result-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
